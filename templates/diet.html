<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,
          initial-scale=1.0">

    <title>Diet AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <h1>🥗 Diet AI</h1>

    <form id="dietForm">

        <input type="text"
               id="goal"
               placeholder="Goal"
               required>

        <input type="text"
               id="food"
               placeholder="Food Preference"
               required>

        <input type="text"
               id="budget"
               placeholder="Budget"
               required>

        <input type="number"
               id="meals"
               placeholder="Meals Per Day"
               required>

        <button type="submit">
            Generate Diet
        </button>

    </form>

    <div id="dietResult"
         class="ai-response">
    </div>

</div>

<script>

document
.getElementById(
"dietForm"
)

.addEventListener(
"submit",

async function(e){

    e.preventDefault()

    const response =
    await fetch(
    "/generate_diet",

    {
        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({

            goal:
            document
            .getElementById(
            "goal"
            ).value,

            food:
            document
            .getElementById(
            "food"
            ).value,

            budget:
            document
            .getElementById(
            "budget"
            ).value,

            meals:
            document
            .getElementById(
            "meals"
            ).value
        })
    })

    const data =
    await response.json()

    document
    .getElementById(
    "dietResult"
    ).innerHTML =
    data.response
})

</script>

</body>
</html>
