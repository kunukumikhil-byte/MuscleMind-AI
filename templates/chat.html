<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,
          initial-scale=1.0">

    <title>Fitness Chat</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <h1>💪 MuscleMind Chat</h1>

    <input type="text"
           id="chatMessage"
           placeholder="Ask fitness question">

    <button onclick="sendMessage()">
        Ask AI
    </button>

    <div id="chatResult"
         class="ai-response">
    </div>

</div>

<script>

async function sendMessage(){

    const message =
    document
    .getElementById(
    "chatMessage"
    ).value

    const response =
    await fetch(
    "/fitness_chat",

    {
        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
            message
        })
    })

    const data =
    await response.json()

    document
    .getElementById(
    "chatResult"
    ).innerHTML =
    data.response
}

</script>

</body>
</html>
