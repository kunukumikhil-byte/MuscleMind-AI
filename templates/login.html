<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,
          initial-scale=1.0">

    <title>Login - MuscleMind AI</title>

    <link rel="stylesheet"
          href="{{ url_for(
          'static',
          filename='css/style.css'
          ) }}">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>
            💪 MuscleMind AI
        </h1>

        <h2>
            Welcome Back
        </h2>

        {% if error %}

        <p class="error-text">
            {{ error }}
        </p>

        {% endif %}

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="divider">
            OR
        </div>

        <a href="/google-login">

            <button class="google-btn">

                Continue with Google

            </button>

        </a>

        <p class="bottom-text">

            New here?

            <a href="/register">

                Create Account

            </a>

        </p>

    </div>

</div>

</body>
</html>
